environment: development
health:
  duration: 1s
  timeout: 1s
id:
  kind: uuid
migrate:
  databases:
    - name: postgres
      source: file:secrets/source
      url: file:secrets/pg
    - name: invalid_source
      source: file:secrets/invalid_source
      url: file:secrets/pg
    - name: missing_source
      source: file:secrets/none
      url: file:secrets/pg
    - name: missing_url
      source: file:secrets/source
      url: file:secrets/none
    - name: invalid_url
      source: file:secrets/source
      url: file:secrets/invalid_pg
    - name: invalid_db
      source: file:secrets/source
      url: file:secrets/invalid_db
    - name: invalid_quoted_table
      source: file:secrets/source
      url: file:secrets/invalid_quoted_table
    - name: invalid_incomplete_quoted_table
      source: file:secrets/source
      url: file:secrets/invalid_incomplete_quoted_table
    - name: invalid_port
      source: file:secrets/source
      url: file:secrets/invalid_port
    - name: github
      source: file:secrets/github
      url: file:secrets/pg
    - name: timeout
      source: file:secrets/timeout_source
      url: file:secrets/timeout_pg
    - name: logs
      source: file:secrets/log_source
      url: file:secrets/log_pg
telemetry:
  logger:
    kind: text
    level: info
  metrics:
    kind: prometheus
  tracer:
    kind: otlp
    url: http://localhost:4318/v1/traces
transport:
  access:
    model: file:secrets/access_model
    policy: file:secrets/access_policy
  http:
    address: tcp://:11000
    token:
      kind: ssh
      ssh:
        key: migrieren
        exp: 1h
        keys:
          migrieren:
            public: file:secrets/ssh_migrieren.pub
          guest:
            public: file:secrets/ssh_guest.pub
    limiter:
      kind: user-id
      tokens: 1000
      interval: 1s
    timeout: 5s
  grpc:
    address: tcp://:12000
    token:
      kind: ssh
      ssh:
        key: migrieren
        exp: 1h
        keys:
          migrieren:
            public: file:secrets/ssh_migrieren.pub
          guest:
            public: file:secrets/ssh_guest.pub
    limiter:
      kind: user-id
      tokens: 1000
      interval: 1s
    timeout: 5s
