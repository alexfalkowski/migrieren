version: "1.0"
name: migrieren
url: http://localhost:11000
log: reports/nonnative.log
processes:
  - name: server
    go:
      tools: [cover]
      output: reports
      executable: ../migrieren
      command: server
      parameters: ["-config file:.config/server.yml"]
    timeout: 5
    wait: 1
    host: 127.0.0.1
    ports:
      - 11000
      - 12000
    log: reports/server.log
    readiness:
      - kind: http
        port: 11000
        path: /migrieren/readyz
      - kind: grpc
        port: 12000
        service: migrieren.v1.Service
services:
  - name: postgres
    host: 127.0.0.1
    port: 5433
    readiness:
      - kind: tcp
        host: 127.0.0.1
        port: 5432
    proxy:
      kind: fault_injection
      host: 127.0.0.1
      port: 5432
      log: reports/proxy_postgres.log
      wait: 1
      options:
        delay: 2
