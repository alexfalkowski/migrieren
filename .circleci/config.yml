version: 2.1

jobs:
  build-service:
    docker:
      - image: alexfalkowski/go:4.17
      - image: postgres:18-trixie
        environment:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
      - image: grafana/mimir:latest
        command: -server.http-listen-port=9009 -auth.multitenancy-enabled=false -ingester.ring.replication-factor=1
    working_directory: ~/migrieren
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: make source-key
      - run: dockerize -wait tcp://localhost:5432 -wait tcp://localhost:9009 -timeout 1m
      - restore_cache:
          name: restore go cache
          keys:
            - migrieren-go-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
            - migrieren-go-cache-
      - restore_cache:
          name: restore ruby cache
          keys:
            - migrieren-ruby-cache-{{ checksum "test/Gemfile.lock" }}-{{ checksum "~/.ruby-version" }}-{{ checksum ".source-key" }}
            - migrieren-ruby-cache-
      - run: make clean
      - run: make dep
      - save_cache:
          name: save go cache
          key: migrieren-go-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/go/pkg/mod
      - save_cache:
          name: save ruby cache
          key: migrieren-ruby-cache-{{ checksum "test/Gemfile.lock" }}-{{ checksum "~/.ruby-version" }}-{{ checksum ".source-key" }}
          paths:
            - test/vendor
      - restore_cache:
          name: restore go build cache
          keys:
            - migrieren-go-build-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
            - migrieren-go-build-cache-
      - restore_cache:
          name: restore go lint cache
          keys:
            - migrieren-go-lint-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-lint-version" }}-{{ checksum ".source-key" }}
            - migrieren-go-lint-cache-
      - run: make clean
      - run: make lint
      - save_cache:
          name: save go lint cache
          key: migrieren-go-lint-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-lint-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/.cache/golangci-lint
      - run: make proto-breaking
      - run: make proto-stale
      - run: make sec
      - run: make features
      - run: make benchmarks
      - run: make analyse
      - save_cache:
          name: save go build cache
          key: migrieren-go-build-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/.cache/go-build
      - run: make coverage
      - store_test_results:
          path: test/reports
      - store_artifacts:
          path: test/reports
      - run: make codecov-upload
    resource_class: arm.large
  sync:
    docker:
      - image: alexfalkowski/release:8.15
    working_directory: ~/migrieren
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: make sync push
    resource_class: arm.large
  version:
    docker:
      - image: alexfalkowski/release:8.15
    working_directory: ~/migrieren
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: make source-key
      - restore_cache:
          name: restore go cache
          keys:
            - migrieren-go-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
            - migrieren-go-cache-
      - restore_cache:
          name: restore go build cache
          keys:
            - migrieren-go-build-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
            - migrieren-go-build-cache-
      - run: version
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - .
      - run: package
    resource_class: arm.large
  wait-all:
    docker:
      - image: alexfalkowski/go:4.17
    steps:
      - run: echo "all applicable jobs finished"
    resource_class: arm.large
  test-docker-amd64:
    docker:
      - image: alexfalkowski/go:4.17
    working_directory: ~/migrieren
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make platform=amd64 test-docker
    resource_class: large
  test-docker-arm64:
    docker:
      - image: alexfalkowski/go:4.17
    working_directory: ~/migrieren
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make platform=arm64 test-docker
    resource_class: arm.large
  release-docker-amd64:
    docker:
      - image: alexfalkowski/go:4.17
    working_directory: ~/migrieren
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make platform=amd64 release-docker
    resource_class: large
  release-docker-arm64:
    docker:
      - image: alexfalkowski/go:4.17
    working_directory: ~/migrieren
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make platform=arm64 release-docker
    resource_class: arm.large
  manifest-docker:
    docker:
      - image: alexfalkowski/go:4.17
    working_directory: ~/migrieren
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make manifest-docker
    resource_class: arm.large

workflows:
  migrieren:
    max_auto_reruns: 3
    jobs:
      - build-service
      - test-docker-amd64:
          filters:
            branches:
              ignore: master
      - test-docker-arm64:
          filters:
            branches:
              ignore: master
      - sync:
          requires:
            - build-service
            - test-docker-amd64
            - test-docker-arm64
          filters:
            branches:
              ignore: master
      - version:
          context: gh
          serial-group: << pipeline.project.slug >>/version
          requires:
            - build-service
          filters:
            branches:
              only: master
      - release-docker-amd64:
          context: docker
          requires:
            - version
          filters:
            branches:
              only: master
      - release-docker-arm64:
          context: docker
          requires:
            - version
          filters:
            branches:
              only: master
      - manifest-docker:
          context: docker
          serial-group: << pipeline.project.slug >>/manifest-docker
          requires:
            - release-docker-amd64
            - release-docker-arm64
          filters:
            branches:
              only: master
      - wait-all:
          requires:
            - build-service
            - sync
            - test-docker-amd64
            - test-docker-arm64
            - version
            - release-docker-amd64
            - release-docker-arm64
            - manifest-docker
