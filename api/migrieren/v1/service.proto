syntax = "proto3";

package migrieren.v1;

option go_package = "github.com/alexfalkowski/migrieren/api/migrieren/v1";
option ruby_package = "Migrieren::V1";

// Migration reports the database, migration version, and bounded migrate logs.
message Migration {
  // database is the configured logical database name requested by the caller.
  string database = 1;

  // version is the target migration version for Migrate responses, or the
  // resulting migration version for ApplyMigrations responses.
  uint64 version = 2;

  // logs contains in-memory migrate log lines collected during execution.
  // The service caps this list at a configured maximum (default 100). When
  // older lines are dropped, the first entry begins with "migration logs
  // truncated" and reports how many recent lines are shown out of the total.
  repeated string logs = 3;
}

// MigrateRequest identifies a configured database and target schema version.
message MigrateRequest {
  // database is the configured logical database name, not a raw database URL.
  string database = 1;

  // version is the target migration version. It must be greater than zero and
  // fit within the server-supported signed integer range.
  uint64 version = 2;
}

// MigrateResponse contains response metadata and the migration result.
message MigrateResponse {
  // meta contains request metadata emitted by the service runtime.
  map<string, string> meta = 1;

  // migration echoes the requested database/version and collected logs.
  Migration migration = 2;
}

// ApplyMigrationsRequest identifies a configured database to converge.
message ApplyMigrationsRequest {
  // database is the configured logical database name, not a raw database URL.
  string database = 1;
}

// ApplyMigrationsResponse contains response metadata and the resulting
// migration state.
message ApplyMigrationsResponse {
  // meta contains request metadata emitted by the service runtime.
  map<string, string> meta = 1;

  // migration reports the requested database, resulting version, and collected
  // logs.
  Migration migration = 2;
}

// MigrationState identifies whether a database has no recorded migration,
// a clean recorded version, or a dirty recorded version.
enum MigrationState {
  // MIGRATION_STATE_UNSPECIFIED is the default value for unknown states.
  MIGRATION_STATE_UNSPECIFIED = 0;

  // MIGRATION_STATE_UNAPPLIED means no migration version has been recorded.
  MIGRATION_STATE_UNAPPLIED = 1;

  // MIGRATION_STATE_CLEAN means a non-dirty migration version is recorded.
  MIGRATION_STATE_CLEAN = 2;

  // MIGRATION_STATE_DIRTY means migration metadata is dirty. Its associated
  // version can be zero when the dirty state has no recorded version.
  MIGRATION_STATE_DIRTY = 3;
}

// MigrationStatus reports the current version state for a configured database.
message MigrationStatus {
  // database is the configured logical database name requested by the caller.
  string database = 1;

  // version is the current clean or dirty migration version.
  //
  // When state is MIGRATION_STATE_UNAPPLIED, version is zero and no migration
  // version has been recorded yet. Version can also be zero when state is
  // MIGRATION_STATE_DIRTY and the dirty metadata has no recorded version, so
  // callers must inspect state rather than classifying zero by itself.
  uint64 version = 2;

  // state reports whether the migration version is unapplied, clean, or dirty.
  MigrationState state = 3;
}

// MigrationDirection identifies whether the current database state can move
// toward a planned migration target.
enum MigrationDirection {
  // MIGRATION_DIRECTION_UNSPECIFIED is the default value for unknown directions.
  MIGRATION_DIRECTION_UNSPECIFIED = 0;

  // MIGRATION_DIRECTION_NONE means no migrations are pending for the plan.
  MIGRATION_DIRECTION_NONE = 1;

  // MIGRATION_DIRECTION_UP means one or more up migrations are pending.
  MIGRATION_DIRECTION_UP = 2;

  // MIGRATION_DIRECTION_DOWN means one or more down migrations are pending.
  MIGRATION_DIRECTION_DOWN = 3;
}

// MigrationPlan reports non-mutating migration planning information for a
// configured database.
message MigrationPlan {
  // status reports the current database migration version state.
  MigrationStatus status = 1;

  // latest_version is the highest migration version available from the
  // configured source. It is zero when the source has no migrations.
  uint64 latest_version = 2;

  // target_version is the version the plan can converge toward. It equals the
  // requested PlanMigrationsRequest target_version when supplied. Otherwise,
  // it equals latest_version when direction is MIGRATION_DIRECTION_UP, or the
  // current status version when no up migrations are pending.
  uint64 target_version = 3;

  // direction reports whether the plan applies up migrations, removes down
  // migrations, or makes no migration changes.
  MigrationDirection direction = 4;

  // pending_versions contains source versions that the plan would apply or
  // remove, in execution order. Down plans include the current version and
  // exclude the target version. For an omitted target on a dirty database, it
  // instead reports later source versions discovered during legacy planning;
  // direction remains MIGRATION_DIRECTION_NONE and the list is not executable.
  // It is empty when no migrations are pending or discovered.
  repeated uint64 pending_versions = 5;
}

// PlanMigrationsRequest identifies the configured database and optional target
// to inspect against its migration source.
message PlanMigrationsRequest {
  // database is the configured logical database name, not a raw database URL.
  string database = 1;

  // target_version is an optional migration version to preview. When omitted,
  // the service previews convergence to the latest available up migration.
  // When supplied, it must be greater than zero and fit within the
  // server-supported signed integer range. The database must not be dirty, the
  // target must exist in the source, and any recorded current version must also
  // exist in the source; violations are migration-inspection failures rather
  // than InvalidArgument errors.
  optional uint64 target_version = 2;
}

// PlanMigrationsResponse contains response metadata and the migration plan.
message PlanMigrationsResponse {
  // meta contains request metadata emitted by the service runtime.
  map<string, string> meta = 1;

  // plan reports current status and pending source versions without applying
  // migrations.
  MigrationPlan plan = 2;
}

// StatusRequest identifies the configured database to inspect.
message StatusRequest {
  // database is the configured logical database name, not a raw database URL.
  string database = 1;
}

// StatusResponse contains response metadata and current migration status.
message StatusResponse {
  // meta contains request metadata emitted by the service runtime.
  map<string, string> meta = 1;

  // status reports the current migration version state.
  MigrationStatus status = 2;
}

// Database identifies one configured logical database.
message Database {
  // name is the configured logical database name accepted by migration RPCs.
  string name = 1;
}

// ListDatabasesRequest requests the configured logical database names.
message ListDatabasesRequest {}

// ListDatabasesResponse contains configured logical database names.
message ListDatabasesResponse {
  // meta contains request metadata emitted by the service runtime.
  map<string, string> meta = 1;

  // databases contains configured logical database names in config order.
  repeated Database databases = 2;
}

// Service runs configured database migrations.
service Service {
  // Migrate migrates a configured database to the requested version.
  //
  // Errors use InvalidArgument for versions outside the supported range,
  // NotFound for unknown databases, Canceled/DeadlineExceeded for stopped
  // requests, and Internal for configuration, source, database, or migration
  // failures.
  //
  // gRPC failures after request validation include trailers when the request
  // reaches the transport migrator. This includes unknown database names and
  // source/database setup or reference-resolution failures; pre-migration
  // validation InvalidArgument responses do not use this trailer path.
  // - migration-error: not_found, canceled, deadline_exceeded, invalid_config,
  //   invalid_migration, or unknown.
  // - migration-log-count: the number of migration log lines returned.
  // - migration-stage: source for source setup or resolution failures, or url
  //   for database setup or URL-resolution failures.
  // - migration-log-last: the last migration log line when logs were captured.
  rpc Migrate(MigrateRequest) returns (MigrateResponse) {}

  // ApplyMigrations applies all pending up migrations for a configured
  // database.
  //
  // If the database is already current, the request succeeds as a no-op and
  // reports the current migration version.
  //
  // Errors use NotFound for unknown databases, Canceled/DeadlineExceeded for
  // stopped requests, and Internal for configuration, source, database, final
  // version inspection, or migration failures.
  //
  // Failures after request routing expose the same safe diagnostic trailers as
  // Migrate, including migration-error, migration-log-count, migration-stage,
  // and migration-log-last when those values are available.
  //
  // As with Migrate and Status, strict request cancellation depends on upstream
  // migrate v4 context support, which is currently incomplete in some database
  // driver paths.
  rpc ApplyMigrations(ApplyMigrationsRequest) returns (ApplyMigrationsResponse) {}

  // PlanMigrations reports current status and planned migration versions for a
  // configured database without applying migration files.
  //
  // Errors use InvalidArgument for supplied target versions outside the
  // supported range, NotFound for unknown databases, Canceled/DeadlineExceeded
  // for stopped requests, and Internal for configuration, source, database, or
  // migration inspection failures.
  //
  // Failures after request routing expose the same safe diagnostic trailers as
  // Migrate, including migration-error, migration-log-count, migration-stage,
  // and migration-log-last when those values are available.
  //
  // An explicit target requires a non-dirty database state and source
  // membership for both the target and any recorded current version. Violations
  // are reported as Internal migration-inspection failures, not InvalidArgument.
  //
  // PlanMigrations opens the configured migration source to discover available
  // versions, but it does not read migration bodies or expose configured source
  // strings, database URL strings, or resolved secret values.
  rpc PlanMigrations(PlanMigrationsRequest) returns (PlanMigrationsResponse) {}

  // Status reports the current migration version state for a configured
  // database.
  //
  // Errors use NotFound for unknown databases, Canceled/DeadlineExceeded for
  // stopped requests, and Internal for configuration or database inspection
  // failures.
  //
  // Failures after request routing expose the same safe diagnostic trailers as
  // Migrate when those values are available. Status does not open a migration
  // source, so migration-stage is url when database setup or URL resolution
  // fails.
  //
  // Status does not apply migration files, but strict request cancellation
  // depends on upstream migrate v4 context support, which is currently
  // incomplete in some database driver inspection paths.
  rpc Status(StatusRequest) returns (StatusResponse) {}

  // ListDatabases reports configured logical database names.
  //
  // This does not expose configured source strings, database URL strings, or
  // resolved secret values.
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse) {}
}
